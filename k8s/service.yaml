# ─────────────────────────────────────────────────────────────────────────────
# k8s/service.yaml — Kubernetes Service for Web Scraping AI Bot
# LoadBalancer type creates an AWS Elastic Load Balancer (ELB) automatically.
# This exposes the Streamlit app publicly on port 80.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Service
metadata:
  name: scraper-bot-service
  namespace: default
  labels:
    app: scraper-bot
  annotations:
    # AWS EKS annotations for ALB/NLB configuration
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    # Optional: SSL certificate ARN for HTTPS
    # service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:REGION:ACCOUNT:certificate/CERT-ID"
    # service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"

spec:
  type: LoadBalancer  # Creates AWS ELB — exposes app to the internet

  selector:
    app: scraper-bot  # Routes traffic to pods with this label

  ports:
    - name: http
      protocol: TCP
      port: 80           # External port (browser hits this)
      targetPort: 8501   # Internal Streamlit port

    # Uncomment for HTTPS support (requires SSL cert annotation above)
    # - name: https
    #   protocol: TCP
    #   port: 443
    #   targetPort: 8501

  # Session affinity helps with Streamlit's WebSocket connections
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600  # 1 hour session stickiness
