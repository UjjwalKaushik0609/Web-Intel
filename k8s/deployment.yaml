# =============================================================================
# k8s/deployment.yaml — Kubernetes Deployment for Web Intel
# Deploys 2 replicas with resource limits and health checks.
# API key is loaded from Kubernetes Secret (see secret.yaml).
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-intel-deployment
  namespace: default
  labels:
    app: web-intel
    version: "2.0.0"
    component: web
spec:
  replicas: 2  # Start with 2 pods; HPA will scale up to 5

  selector:
    matchLabels:
      app: web-intel

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: web-intel
        version: "2.0.0"

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      containers:
        - name: web-intel
          # Replace with your actual ECR image URI after pushing
          image: YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/web-intel:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8501
              name: streamlit
              protocol: TCP

          # NOTE: This loads a key from the cluster Secret for a PRIVATE
          # deployment. For a PUBLIC multi-user deployment, remove this
          # env var entirely — the app already lets each visitor paste
          # their own key in the sidebar (session-scoped, never shared).
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: web-intel-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
            - name: STREAMLIT_SERVER_ADDRESS
              value: "0.0.0.0"
            - name: STREAMLIT_SERVER_HEADLESS
              value: "true"
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CACHE_TTL
              value: "3600"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10

          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          startupProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: cache-volume
              mountPath: /app/.cache
            - name: exports-volume
              mountPath: /app/exports

      volumes:
        - name: cache-volume
          emptyDir:
            sizeLimit: 500Mi
        - name: exports-volume
          emptyDir:
            sizeLimit: 500Mi

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: web-intel

      terminationGracePeriodSeconds: 30