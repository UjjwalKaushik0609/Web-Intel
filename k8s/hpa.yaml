# =============================================================================
# k8s/hpa.yaml — Horizontal Pod Autoscaler for Web Intel
# Automatically scales pods between 2 and 5 based on CPU and memory usage.
# Requires the Kubernetes Metrics Server to be installed on the cluster.
#
# Install Metrics Server on EKS:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# =============================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-intel-hpa
  namespace: default
  labels:
    app: web-intel

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-intel-deployment

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
