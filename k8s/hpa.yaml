# ─────────────────────────────────────────────────────────────────────────────
# k8s/hpa.yaml — Horizontal Pod Autoscaler for Web Scraping AI Bot
# Automatically scales pods between 2 and 5 based on CPU and memory usage.
# Requires the Kubernetes Metrics Server to be installed on the cluster.
#
# Install Metrics Server on EKS:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scraper-bot-hpa
  namespace: default
  labels:
    app: scraper-bot

spec:
  # Target deployment to autoscale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scraper-bot-deployment

  # Pod count bounds
  minReplicas: 2  # Always keep at least 2 pods running (high availability)
  maxReplicas: 5  # Don't scale above 5 pods (cost control)

  metrics:
    # Scale up when average CPU across all pods exceeds 70%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Scale up when average memory across all pods exceeds 80%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # Scaling behavior — prevents too-frequent scaling (flapping)
  behavior:
    scaleUp:
      # Scale up fast when under load
      stabilizationWindowSeconds: 60   # Wait 1 min before scaling up again
      policies:
        - type: Pods
          value: 2        # Add at most 2 pods at a time
          periodSeconds: 60
        - type: Percent
          value: 50       # Or scale up by 50%, whichever is larger
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      # Scale down slowly to avoid removing pods too aggressively
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1        # Remove at most 1 pod at a time
          periodSeconds: 120
      selectPolicy: Min
