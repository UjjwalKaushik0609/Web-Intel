# =============================================================================
# k8s/secret.yaml — Kubernetes Secret for Web Intel
#
# SECURITY NOTE: This secret is OPTIONAL. Web Intel is designed so that
# each visitor pastes their OWN Gemini API key in the app's sidebar
# (stored in their browser session only — never on the server, never
# shared between visitors). You generally do NOT need this Secret at all
# for a public/multi-user deployment.
#
# Only create this Secret if you want a PRIVATE single-user deployment
# that auto-loads YOUR key as a fallback default.
#
# WARNING: Never commit a real key into this file. Use kubectl instead:
#
#   kubectl create secret generic web-intel-secrets \
#     --from-literal=GEMINI_API_KEY="your_actual_api_key_here" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: web-intel-secrets
  namespace: default
  labels:
    app: web-intel
type: Opaque

# Values must be base64-encoded.
# Encode: echo -n "your_key" | base64
# Decode: echo "encoded" | base64 --decode
#
# Replace REPLACE_WITH_BASE64_ENCODED_API_KEY with your actual key,
# or leave this Secret unapplied entirely (deployment.yaml marks the
# env var as optional: true, so the app will run fine without it).
data:
  GEMINI_API_KEY: REPLACE_WITH_BASE64_ENCODED_API_KEY
