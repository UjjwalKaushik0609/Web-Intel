# ─────────────────────────────────────────────────────────────────────────────
# k8s/secret.yaml — Kubernetes Secret for API Key
# WARNING: Do NOT commit real API keys to Git!
# This template uses placeholder values.
#
# To create the secret with your real key:
#   kubectl create secret generic scraper-bot-secrets \
#     --from-literal=GEMINI_API_KEY="your_actual_api_key_here" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or using AWS Secrets Manager (recommended for production):
#   Install the AWS Secrets Manager CSI driver and reference secrets there.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: scraper-bot-secrets
  namespace: default
  labels:
    app: scraper-bot
type: Opaque

# Values must be base64-encoded.
# Encode: echo -n "your_key" | base64
# Decode: echo "encoded" | base64 --decode
#
# IMPORTANT: Replace REPLACE_WITH_BASE64_ENCODED_KEY with your actual key.
# The deployment.yaml references this secret via secretKeyRef.
data:
  GEMINI_API_KEY: REPLACE_WITH_BASE64_ENCODED_API_KEY
