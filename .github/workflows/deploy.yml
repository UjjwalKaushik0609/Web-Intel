# =============================================================================
# .github/workflows/deploy.yml — CI/CD Pipeline for Web Intel
#
# Triggers: push to main branch
# Steps:
#   1. Run pytest tests
#   2. Build Docker image
#   3. Push to AWS ECR
#   4. Deploy to AWS EKS using kubectl
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - AWS_REGION
#   - AWS_ACCOUNT_ID
#   - ECR_REPOSITORY        (set to: web-intel)
#   - EKS_CLUSTER_NAME
#   - GEMINI_API_KEY        (only needed if running live API tests; optional)
# =============================================================================

name: CI/CD — Build, Test, Deploy Web Intel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=scraper --cov=pipeline --cov=ai_engine \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  build-and-push:
    name: 🐳 Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image-uri: ${{ steps.build-image.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          LATEST_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"

          echo "Building image: $IMAGE_URI"

          docker build \
            --tag "$IMAGE_URI" \
            --tag "$LATEST_URI" \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            .

          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "✅ Image pushed: $IMAGE_URI"

      - name: Verify no secrets leaked into the image
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "Checking image does not contain .env..."
          docker run --rm "$IMAGE_URI" sh -c '[ ! -f .env ] && echo "✅ No .env in image" || (echo "❌ .env FOUND IN IMAGE" && exit 1)'

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image-uri }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload vulnerability scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  deploy:
    name: 🚀 Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Update deployment image
        run: |
          IMAGE_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          sed -i "s|YOUR_AWS_ACCOUNT_ID.dkr.ecr.YOUR_REGION.amazonaws.com/web-intel:latest|$IMAGE_URI|g" \
            k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          # k8s/secret.yaml is intentionally NOT applied automatically —
          # Web Intel doesn't require a server-side key for public use.
          # Apply it manually only if you want a private fallback key:
          #   kubectl apply -f k8s/secret.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/web-intel-deployment --timeout=300s

      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment web-intel-deployment
          echo ""
          echo "=== Running Pods ==="
          kubectl get pods -l app=web-intel
          echo ""
          echo "=== Service ==="
          kubectl get service web-intel-service
          echo ""
          echo "=== HPA Status ==="
          kubectl get hpa web-intel-hpa

      - name: Get Load Balancer URL
        run: |
          echo "=== App URL (may take 1-2 min for DNS propagation) ==="
          kubectl get service web-intel-service \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
          echo ""

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Rolling back..."
          kubectl rollout undo deployment/web-intel-deployment
          echo "✅ Rollback completed"