# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Web Scraping AI Bot
# Single-service deployment for local development and testing.
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  scraper-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: web-scraping-ai-bot
    restart: unless-stopped

    # Port mapping: host:container
    ports:
      - "8501:8501"

    # Mount .env file for API key and config
    env_file:
      - .env

    # Additional environment overrides
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1

    # Persist cache and exports across container restarts
    volumes:
      - scraper_cache:/app/.cache
      - scraper_exports:/app/exports

    # Resource limits — adjust based on your machine
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    # Health check using Streamlit's built-in health endpoint
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Logging config — limit log size to avoid disk filling up
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volumes for persistence
volumes:
  scraper_cache:
    driver: local
  scraper_exports:
    driver: local
