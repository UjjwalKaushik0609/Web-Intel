# =============================================================================
# docker-compose.yml — Web Intel
# SECURITY: No API key is baked into the image or this file.
# Each user enters their OWN key in the app's sidebar at runtime.
# =============================================================================

version: "3.9"

services:
  web-intel:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: web-intel
    restart: unless-stopped

    ports:
      - "8501:8501"

    # NOTE: We deliberately do NOT load .env here for the public image.
    # The app asks each visitor for their own Gemini API key in the
    # sidebar (stored in their browser session only — see app/main.py).
    #
    # If you want a PRIVATE single-user deployment that auto-loads YOUR
    # key, uncomment the line below (only do this for local/private use,
    # never for a publicly shared container):
    # env_file:
    #   - .env

    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1

    volumes:
      - webintel_cache:/app/.cache
      - webintel_exports:/app/exports

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  webintel_cache:
    driver: local
  webintel_exports:
    driver: local